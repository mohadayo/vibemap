{% extends "base.html" %}

{% block title %}プロフィール編集 - VibeMap{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-6">
    <h3 class="fw-bold mb-4"><i class="bi bi-person-gear text-warning"></i> プロフィール編集</h3>
    <form method="post" enctype="multipart/form-data">
      {% csrf_token %}
      {% if form.instance.avatar %}
      <div class="text-center mb-3">
        <img src="{{ form.instance.avatar.url }}" class="avatar-lg" alt="現在のアイコン">
      </div>
      {% endif %}
      {% for field in form %}
      <div class="mb-3">
        <label class="form-label fw-bold small">{{ field.label }}</label>
        {{ field }}
        {% if field.errors %}
        <div class="text-danger small">{{ field.errors.0 }}</div>
        {% endif %}
      </div>
      {% endfor %}
      <button type="submit" class="btn btn-warning w-100 fw-bold">保存する</button>
    </form>
  </div>
</div>
{% endblock %}
