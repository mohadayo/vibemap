{% extends "base.html" %}

{% block title %}削除: {{ spot.title }} - VibeMap{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-6">
    <div class="card border-danger">
      <div class="card-body text-center py-5">
        <i class="bi bi-exclamation-triangle text-danger" style="font-size:3rem;"></i>
        <h4 class="fw-bold mt-3">「{{ spot.title }}」を削除しますか？</h4>
        <p class="text-muted">この操作は取り消せません</p>
        <form method="post">
          {% csrf_token %}
          <a href="{% url 'spots:spot_detail' pk=spot.pk %}" class="btn btn-outline-secondary me-2">キャンセル</a>
          <button type="submit" class="btn btn-danger">削除する</button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
